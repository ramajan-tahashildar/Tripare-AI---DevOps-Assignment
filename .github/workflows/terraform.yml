name: Terraform CI

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to plan (dev or prod)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read
  pull-requests: write  # required to post plan as PR comment

env:
  TF_VERSION: "1.6.6"
  AWS_REGION: "us-east-1"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job: Lint — terraform fmt check across all .tf files
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: "Terraform Format Check"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive infra/
        continue-on-error: true

      - name: Comment fmt result on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.fmt.outcome }}';
            const icon    = outcome === 'success' ? '✅' : '❌';
            const body    = `### ${icon} Terraform Format (\`terraform fmt\`)
            **Result:** \`${outcome}\`
            ${outcome !== 'success' ? '> Run `terraform fmt -recursive infra/` locally to fix formatting.' : ''}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail on fmt error
        if: steps.fmt.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────────────────────────────────
  # Job: Plan — validate + plan for each environment
  # ─────────────────────────────────────────────────────────────────────────
  plan:
    name: "Terraform Plan — ${{ matrix.environment }}"
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod]

    defaults:
      run:
        working-directory: infra/envs/${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Use a local backend for CI plan (no S3 needed — plan-only)
      - name: Override backend to local for CI
        run: |
          cat > backend_override.tf << 'OVERRIDE'
          terraform {
            backend "local" {
              path = "/tmp/terraform-${{ matrix.environment }}.tfstate"
            }
          }
          OVERRIDE

      - name: Terraform Init
        id: init
        run: terraform init -input=false
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="db_password=PLACEHOLDER_CI_ONLY" \
            -refresh=false \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        continue-on-error: true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.environment }}
          path: |
            infra/envs/${{ matrix.environment }}/tfplan
            infra/envs/${{ matrix.environment }}/plan_output.txt
          retention-days: 7

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs      = require('fs');
            const planFile = 'infra/envs/${{ matrix.environment }}/plan_output.txt';
            let   plan     = '';
            try   { plan = fs.readFileSync(planFile, 'utf8'); } catch (e) { plan = 'Plan output not found.'; }

            // Truncate to avoid GitHub comment size limit (65535 chars)
            const MAX   = 60000;
            const trunc = plan.length > MAX
              ? plan.substring(0, MAX) + '\n\n... (truncated — download the artifact for the full plan)'
              : plan;

            const initOutcome     = '${{ steps.init.outcome }}';
            const validateOutcome = '${{ steps.validate.outcome }}';
            const planOutcome     = '${{ steps.plan.outcome }}';

            const statusLine = (name, outcome) =>
              `| ${name} | ${outcome === 'success' ? '✅ success' : '❌ ' + outcome} |`;

            const body = `## Terraform Plan — \`${{ matrix.environment }}\`

            | Step | Status |
            |------|--------|
            ${statusLine('terraform init',     initOutcome)}
            ${statusLine('terraform validate', validateOutcome)}
            ${statusLine('terraform plan',     planOutcome)}

            <details><summary>📋 Plan Output (click to expand)</summary>

            \`\`\`hcl
            ${trunc}
            \`\`\`
            </details>

            > **Artifact:** Download the full plan from [workflow artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            *Triggered by commit \`${{ github.sha }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body
            });

      - name: Fail job if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
