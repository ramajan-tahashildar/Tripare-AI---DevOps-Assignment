version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: hotelapp_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Migrations, indexes, and seed data run automatically on first start
      - ./db/migrations/001_create_hotel_bookings.sql:/docker-entrypoint-initdb.d/001_create_hotel_bookings.sql:ro
      - ./db/migrations/002_create_booking_events.sql:/docker-entrypoint-initdb.d/002_create_booking_events.sql:ro
      - ./db/indexes/003_add_indexes.sql:/docker-entrypoint-initdb.d/003_add_indexes.sql:ro
      - ./db/seeds/seed.sql:/docker-entrypoint-initdb.d/004_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - hotelapp

  # Optional: pgAdmin web UI — start with: docker compose --profile tools up
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hotelapp_pgadmin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hotelapp
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local

networks:
  hotelapp:
    driver: bridge
